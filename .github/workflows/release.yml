name: Build and Release AI Terminal

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      # This tells GitHub NOT to cancel Windows/Mac if Ubuntu fails
      fail-fast: false 
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      # FIX 1: Bumped to Node 24 to silence the deprecation warnings
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      # FIX 2: Install Linux packaging tools (Only runs on the Ubuntu server)
      # FIX 2: Install Linux packaging tools (Only runs on the Ubuntu server)
      - name: Install Linux Build Tools
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential rpm libarchive-tools
          sudo gem install fpm

      - name: Install and Natively Compile Dependencies
        run: npm install

      - name: Build and Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --publish always