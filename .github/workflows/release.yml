name: Build and Release AI Terminal

# This tells GitHub to ONLY run this script when you push a new version tag (like v1.0.0)
on:
  push:
    tags:
      - 'v*'

# We need to give the automated bot permission to upload files to the Releases page
permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    # The Matrix Strategy: This tells GitHub to run this exact job 3 separate times, 
    # simultaneously, on 3 different operating systems!
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install and Natively Compile Dependencies
        # Because your package.json has the "postinstall" electron-builder script,
        # this single command will trigger node-gyp to natively compile your 
        # C++ files (SQLite and node-pty) specifically for the cloud runner's OS!
        run: npm install

      - name: Build and Publish
        # We pass the built-in GitHub Token to electron-builder so it has the keys
        # to upload the finished installers right back to your repository.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --publish always